[package]
name = "tests"
version = "0.1.0"
edition = "2021"
publish = false

[features]
default = ["sqlite"]
sql = ["sqlite", "mysql", "postgresql"]
sqlite = ["toasty/sqlite", "dep:toasty-driver-sqlite"]
mysql = ["toasty/mysql", "dep:toasty-driver-mysql"]
dynamodb = ["toasty/dynamodb", "dep:toasty-driver-dynamodb"]
postgresql = ["toasty/postgresql", "dep:toasty-driver-postgresql"]

[dependencies]
assert-struct.workspace = true
async-trait.workspace = true
rust_decimal.workspace = true
bigdecimal.workspace = true
jiff.workspace = true
toasty = { workspace = true, features = ["rust_decimal", "bigdecimal", "jiff"] }
toasty-core = { workspace = true, features = ["assert-struct"] }
toasty-macros.workspace = true
tokio.workspace = true

# Database drivers for TestDriver implementations
toasty-driver-sqlite = { workspace = true, optional = true }
toasty-driver-mysql = { workspace = true, optional = true }
toasty-driver-postgresql = { workspace = true, optional = true }
toasty-driver-dynamodb = { workspace = true, optional = true }

# Database clients for cleanup
tokio-postgres.workspace = true
mysql_async.workspace = true
aws-config.workspace = true
aws-sdk-dynamodb.workspace = true
rusqlite.workspace = true

# Utilities
std-util.workspace = true
tempfile.workspace = true
trybuild.workspace = true
env_logger = "0.11.8"

# Third-party types
uuid.workspace = true

[dev-dependencies]
