name: Release-plz

on:
  push:
    branches:
      - main

env:
  # Pinned so a new Rust release cannot break release-plz on its own.
  # Bumped automatically by Renovate; see .github/renovate.json5.
  RUST_STABLE_VERSION: "1.95.0"

jobs:
  release-plz-release:
    name: Release-plz release
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'tokio-rs' }}
    permissions:
      contents: write
      id-token: write
    steps:
      - &checkout
        name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.RELEASE_PLZ_TOKEN }}
      - &install-rust
        name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_STABLE_VERSION }}
      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}

  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'tokio-rs' }}
    permissions:
      pull-requests: write
      contents: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - *checkout
      - *install-rust
      # The changelog postprocessor in release-plz.toml shells out to
      # `claude` to filter each rendered release section down to changes
      # that matter to library consumers. The script falls back to
      # passthrough on any error, so an outage or missing token will
      # surface the unfiltered changelog rather than block the release.
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code
      - name: Run release-plz
        id: release-plz
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

      # The README links to the released guide / API docs at a specific
      # version. Source of truth is the `toasty` version pinned in
      # `[workspace.dependencies]`, which release-plz bumps on the PR
      # branch. Re-applied on every run because release-plz force-pushes
      # its branch.
      - name: Sync README version with release PR
        if: ${{ steps.release-plz.outputs.prs != '' && steps.release-plz.outputs.prs != '[]' }}
        env:
          PRS: ${{ steps.release-plz.outputs.prs }}
        run: |
          set -euo pipefail
          branch=$(jq -r '.[0].head_branch' <<<"$PRS")
          if [ -z "$branch" ] || [ "$branch" = "null" ]; then
            echo "No release branch detected; skipping README update."
            exit 0
          fi

          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git fetch origin "$branch"
          git checkout "$branch"

          version=$(grep -m1 '^toasty = { version' Cargo.toml \
            | sed -E 's/.*version = "([^"]+)".*/\1/')
          if [ -z "$version" ]; then
            echo "Failed to parse toasty version from Cargo.toml" >&2
            exit 1
          fi

          sed -i -E \
            "s|tokio-rs\\.github\\.io/toasty/[0-9]+\\.[0-9]+\\.[0-9]+/|tokio-rs.github.io/toasty/${version}/|g" \
            README.md

          if git diff --quiet README.md; then
            echo "README already on version ${version}; nothing to update."
            exit 0
          fi

          git add README.md
          git commit -m "chore: point README docs links at ${version}"
          git push origin "$branch"
