name: Deploy Docs

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  # Pinned so a new Rust release cannot break docs builds on its own.
  # Bumped automatically by Renovate; see .github/renovate.json5.
  RUST_STABLE_VERSION: "1.95.0"

jobs:
  build:
    if: github.repository == 'tokio-rs/toasty'
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_STABLE_VERSION }}

      - name: Install mdBook and mdbook-linkcheck2
        uses: taiki-e/install-action@v2
        with:
          tool: mdbook@0.5.2,mdbook-linkcheck2

      - name: Build guide
        run: mdbook build docs/guide

      - name: Build Rust API docs
        run: cargo doc --workspace --no-deps
        env:
          TOASTY_GUIDE_URL: ../../guide/

      - name: Assemble site
        run: |
          mkdir -p _site/nightly
          cp -r docs/guide/book/html _site/nightly/guide
          cp -r target/doc _site/nightly/api
          cp docs/api/index.html _site/nightly/api/index.html
          cat > _site/index.html << 'HEREDOC'
          <!DOCTYPE html>
          <html>
            <head><meta http-equiv="refresh" content="0; url=nightly/guide/"></head>
            <body><a href="nightly/guide/">Redirect to Toasty Guide</a></body>
          </html>
          HEREDOC

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    if: github.repository == 'tokio-rs/toasty'
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
