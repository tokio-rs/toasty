name: Sync labels

on:
  push:
    branches: [main]
    paths:
      - .github/labels.yml
      - .github/workflows/labels.yml
  workflow_dispatch:

permissions:
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: crazy-max/ghaction-github-labeler@v6
        with:
          yaml-file: .github/labels.yml
          skip-delete: true
