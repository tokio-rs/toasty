name: Claude Triage

# Auto-apply a constrained subset of GitHub labels to new issues and PRs.
# Only C- (category) and A- (area) labels — plus S-needs-repro for bugs with
# no reproducer — are applied automatically. Priority, impact, status, and
# community labels are left for humans. See docs/dev/labels.md.

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened, ready_for_review]

jobs:
  triage-issue:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are a triage bot for the toasty repository. Apply GitHub labels
            to issue #${{ github.event.issue.number }} based on its content.

            Steps:

            1. Read the issue:
               gh issue view ${{ github.event.issue.number }} --json title,body,labels

            2. Choose EXACTLY ONE category label from this allowlist. Skip if
               nothing clearly fits — do not guess.
               - C-bug          code behaves incorrectly
               - C-feature      new feature request or missing use case
               - C-enhancement  improvement to an existing feature
               - C-refactor     internal change, no user-visible effect
               - C-docs         user docs, dev docs, rustdoc
               - C-chore        CI, release tooling, scripts, lint fixes

            3. Choose zero or more area labels based on paths / crate names
               mentioned in the body:
               - A-engine     toasty/src/engine/
               - A-macros     toasty-macros, create!, models!
               - A-schema     toasty-core/src/schema/
               - A-sql        toasty-sql
               - A-driver     Driver trait, SQLite/PostgreSQL/MySQL/DynamoDB
               - A-migration  toasty-cli, migration generation
               - A-tests      toasty-driver-integration-suite, workspace tests
               - A-docs       docs/ mdbook content
               - A-ci         .github/workflows, release-plz, scripts/

            4. If (and only if) you chose C-bug AND the body has no clear
               reproducer — steps to reproduce, a code snippet, or a minimal
               example — also apply S-needs-repro.

            5. Apply labels, skipping any already present:
               gh issue edit ${{ github.event.issue.number }} --add-label <label>

            NEVER apply (reserved for humans):
            C-sketch, C-tracking, C-discussion, all P-*, all I-*,
            S-needs-design, S-blocked, S-needs-info, S-waiting-on-author,
            S-waiting-on-review, good first issue, help wanted.

            Do nothing else: no comments, no edits to the issue body, no
            closing. If the issue is ambiguous, apply fewer labels rather
            than guessing.
          claude_args: |
            --allowed-tools "Bash(gh issue view:*),Bash(gh issue edit:*),Bash(gh label list:*)"

  triage-pr:
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are a triage bot for the toasty repository. Apply GitHub labels
            to PR #${{ github.event.pull_request.number }} based on its title
            and changed files.

            Steps:

            1. Read the PR metadata and file list:
               gh pr view ${{ github.event.pull_request.number }} --json title,body,labels,files

            2. Choose EXACTLY ONE category label. The title is a Conventional
               Commit (feat:, fix:, docs:, refactor:, chore:, ci:, build:,
               test:, perf:, style:) — use it as a strong hint, verified
               against the diff:
               - C-bug          fix:
               - C-feature      feat:
               - C-enhancement  improvement to existing feature (often feat: or perf:)
               - C-refactor     refactor:
               - C-docs         docs:
               - C-chore        chore:, ci:, build:

            3. Choose zero or more area labels based on CHANGED FILES:
               - A-engine     crates/toasty/src/engine/**
               - A-macros     crates/toasty-macros/**
               - A-schema     crates/toasty-core/src/schema/**
               - A-sql        crates/toasty-sql/**
               - A-driver     crates/toasty-driver-*/**
               - A-migration  crates/toasty-cli/**
               - A-tests      crates/toasty-driver-integration-suite/**, tests/**
               - A-docs       docs/**
               - A-ci         .github/**, scripts/**

               If a PR spans many areas, apply A- labels that cover the bulk
               of changes — skip areas touched only by incidental edits
               (e.g. a one-line import fix).

            4. Apply labels, skipping any already present:
               gh pr edit ${{ github.event.pull_request.number }} --add-label <label>

            NEVER apply (reserved for humans):
            C-sketch, C-tracking, C-discussion, all P-*, all I-*, all S-*,
            good first issue, help wanted.

            Do nothing else: no review, no comments, no edits to the PR
            description, no merges. Do not run tests or build commands.
          claude_args: |
            --allowed-tools "Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr edit:*),Bash(gh label list:*)"
