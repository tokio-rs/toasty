name: Setup Turso sync server
description: Install tursodb and start a local sync server

outputs:
  sync-url:
    description: Base URL for sync clients
    value: ${{ steps.start.outputs.url }}

runs:
  using: composite
  steps:
    - name: Install tursodb
      shell: bash
      run: |
        curl --proto '=https' --tlsv1.2 -LsSf \
          https://github.com/tursodatabase/turso/releases/download/v0.6.1/turso_cli-installer.sh | sh
        echo "$HOME/.turso" >> "$GITHUB_PATH"   # adjust to installer's actual path

    - name: Start sync server
      id: start
      shell: bash
      run: |
        tursodb :memory: --sync-server 127.0.0.1:8080 \
          >/dev/null 2>&1 &
        echo $! > /tmp/tursodb-sync.pid
        for i in $(seq 1 30); do
          curl -sf http://127.0.0.1:8080 >/dev/null && break
          sleep 1
        done
        echo "url=http://127.0.0.1:8080" >> "$GITHUB_OUTPUT"
