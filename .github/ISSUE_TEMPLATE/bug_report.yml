name: Bug report
description: Report incorrect or unexpected behavior in Toasty.
labels: ["C-bug"]
body:
  - type: markdown
    attributes:
      value: |
        Describe what you observed — what you did, what you expected, and
        what happened instead. A small, self-contained reproducer is the
        single most useful thing you can include.

        Leave the diagnosis to maintainers. Describe what happened, not why
        you think it happens — a guess at the cause tends to send triage
        down the wrong path.

  - type: textarea
    id: what_you_did
    attributes:
      label: What you did
      description: The query or operation you ran, in prose or code.

  - type: textarea
    id: expected
    attributes:
      label: What you expected
      description: The result you expected.

  - type: textarea
    id: actual
    attributes:
      label: What actually happened
      description: |
        What happened instead — the error, wrong result, or panic. Quote
        the exact message, generated SQL, or backtrace. Describe what you
        saw, not why you think it happened.

  - type: textarea
    id: reproducer
    attributes:
      label: Minimal reproducer
      description: |
        A minimal example that demonstrates the issue. A failing test in
        `crates/toasty-driver-integration-suite/src/tests/` is ideal; a
        small standalone snippet works too.
      render: rust

  - type: input
    id: driver
    attributes:
      label: Database driver
      description: |
        Which driver(s) reproduce this. Any of:
        - an in-tree driver: SQLite, PostgreSQL, MySQL, DynamoDB
        - multiple (list them)
        - a third-party driver (name it)
        - other / none, if the bug is not driver-specific
      placeholder: SQLite, or "all SQL drivers", or "none — in toasty-core"

  - type: input
    id: version
    attributes:
      label: Toasty version
      description: Crate version or commit SHA.
      placeholder: "0.x.y or commit abcdef0"

  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Related issues, environment details, anything else relevant.
